---
- name: Configure VM with all required packages (Amazon Linux 2023)
  hosts: tag_Name_smart_voting_server
  become: yes
  gather_facts: yes

  tasks:
    - name: Update all packages (dnf)
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Install common system packages
      dnf:
        name:
          - git
          - curl
          - wget
          - unzip
          - vim
          - htop
          - python3
          - python3-pip
          - python3-virtualenv
          - gcc
          - make
          - cmake
          - openssl-devel
          - bzip2-devel
          - libffi-devel
          - zlib-devel
          - readline-devel
          - sqlite-devel
          - libjpeg-devel
          - libpng-devel
          - libtiff-devel
          - libwebp-devel
          - opencv
        state: present

    - name: Set timezone to Asia/Kolkata
      timezone:
        name: Asia/Kolkata

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow HTTP (port 80) in firewalld (Amazon Linux uses firewalld)
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes

    - name: Allow HTTPS (port 443) in firewalld
      firewalld:
        service: https
        permanent: yes
        state: enabled
        immediate: yes

    - name: Install Gunicorn using pip3
      pip:
        name: gunicorn
        state: present
        executable: pip3
