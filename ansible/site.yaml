------
- name: Complete Infrastructure Setup
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    - name: Display starting deployment
      debug:
        msg: "Starting complete infrastructure deployment for Crawler project"

    - name: Wait for SSH to be ready
      wait_for:
        port: 22
        host: "{{ inventory_hostname }}"
        timeout: 120
      delegate_to: localhost

- name: Setup VM with required packages
  import_playbook: setup-vm.yaml

- name: Configure Database Servers
  import_playbook: configure-database.yaml

- name: Deploy Application with Docker
  import_playbook: deploy-docker.yaml

- name: Post Deployment Verification
  hosts: tier_app:role_master:role_slave
  become: yes
  gather_facts: yes

  tasks:
    - name: Verify all services are running
      service:
        name: "{{ item }}"
        state: started
      loop:
        - mariadb
        - docker
        - nginx
        - amazon-ssm-agent
      ignore_errors: yes

    - name: Check disk usage
      shell: df -h
      register: disk_usage
      changed_when: false

    - name: Display disk usage
      debug:
        var: disk_usage.stdout_lines

    - name: Check memory usage
      shell: free -h
      register: memory_usage
      changed_when: false

    - name: Display memory usage
      debug:
        var: memory_usage.stdout_lines

    - name: Check application health from app servers
      uri:
        url: "http://127.0.0.1/health"
        status_code: 200
      when: "'tier_app' in group_names"
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Display deployment summary
      debug:
        msg: |
          ============================================
          DEPLOYMENT COMPLETE!
          ============================================
          Host: {{ inventory_hostname }}
          Tier: {{ ec2_tags.Tier | default('unknown') }}
          Role: {{ ec2_tags.Role | default('unknown') }}
          ============================================