---
- name: Configure VM with all required packages
  hosts: voting-system
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install common system packages
      apt:
        name:
          - git
          - curl
          - wget
          - unzip
          - vim
          - htop
          - python3
          - python3-pip
          - python3-venv
          - software-properties-common
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Set timezone to Asia/Kolkata
      timezone:
        name: Asia/Kolkata

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow HTTP (port 80) in UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS (port 443) in UFW
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Install Gunicorn using pip3
      pip:
        name: gunicorn
        state: present
        executable: pip3
