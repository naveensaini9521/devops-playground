---
- name: Configure VM with all required packages
  hosts: tier_app
  become: yes
  gather_facts: yes

  tasks:
    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Remove DNF cache directory
      file:
        path: /var/cache/dnf
        state: absent

    - name: Rebuild DNF cache
      command: dnf makecache
      changed_when: false

    - name: Update package cache
      dnf:
        update_cache: yes

    - name: Install common packages including Docker
      dnf:
        name:
          - git
          - wget
          - unzip
          - vim
          - htop
          - python3
          - python3-pip
          - python3-devel
          - gcc
          - make
          - cmake
          - openssl-devel
          - bzip2-devel
          - libffi-devel
          - zlib-devel
          - readline-devel
          - sqlite-devel
          - mariadb105-devel
          - nginx
          - docker
          - telnet
          - nc
        state: present
        update_cache: yes

    - name: Set timezone
      timezone:
        name: Asia/Kolkata

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Create application root directory
      file:
        path: /var/www
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Verify Docker Compose installation
      command: docker-compose --version
      register: compose_version
      changed_when: false

    - name: Display Docker Compose version
      debug:
        msg: "Docker Compose installed: {{ compose_version.stdout }}"

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      debug:
        msg: "Docker installed: {{ docker_version.stdout }}"

    - name: Verify Nginx installation
      command: nginx -v
      register: nginx_version
      changed_when: false
      failed_when: false

    - name: Display Nginx version
      debug:
        msg: "{{ nginx_version.stderr }}"
