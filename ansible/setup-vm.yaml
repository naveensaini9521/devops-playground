---
- name: Configure VM with all required packages
  hosts: tier_app
  become: yes
  gather_facts: yes

  vars:
    app_name: "web-crawler"
    app_user: "ec2-user"
    app_port: 8000
    external_port: 80

  tasks:
    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Update package cache
      dnf:
        update_cache: yes

    - name: Install required packages
      dnf:
        name:
          - git
          - wget
          - unzip
          - vim
          - htop
          - python3
          - python3-pip
          - python3-devel
          - gcc
          - make
          - cmake
          - openssl-devel
          - bzip2-devel
          - libffi-devel
          - zlib-devel
          - readline-devel
          - sqlite-devel
          - mariadb105-devel
          - nginx
          - docker
          - telnet
          - nmap-ncat
          - net-tools
          - jq
          - amazon-ssm-agent
        state: present
        update_cache: yes

    - name: Create Python virtual environment
      command: python3 -m venv /opt/venv
      args:
        creates: /opt/venv

    - name: Upgrade pip in virtual environment
      pip:
        name:
          - pip
          - setuptools
          - wheel
        state: latest
        virtualenv: /opt/venv

    - name: Install Python packages in virtual environment
      pip:
        name:
          - docker
          - PyMySQL
          - boto3
        state: present
        virtualenv: /opt/venv

    - name: Set timezone
      timezone:
        name: Asia/Kolkata

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Create Docker CLI plugin directory
      file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Install Docker Compose plugin
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"

    - name: Configure Docker daemon
      copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2",
            "live-restore": true
          }
      notify: restart docker

    - name: Check Nginx installation
      command: nginx -v
      register: nginx_check
      changed_when: false
      failed_when: false
      ignore_errors: yes

    - name: Install Nginx if missing
      dnf:
        name: nginx
        state: present
      when: nginx_check.rc != 0

    - name: Remove default Nginx config
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      ignore_errors: yes

    - name: Create main Nginx configuration
      copy:
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log;
          pid /run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              sendfile on;
              keepalive_timeout 65;
              client_max_body_size 100M;

              include /etc/nginx/conf.d/*.conf;
          }

    - name: Configure Nginx to proxy to application
      copy:
        dest: /etc/nginx/conf.d/web-crawler.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              # Health check endpoint
              location /health {
                  proxy_pass http://127.0.0.1:{{ app_port }}/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  access_log off;
              }

              # Main application
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  proxy_connect_timeout 60s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
                  proxy_redirect off;
              }

              # Error pages
              error_page 500 502 503 504 /50x.html;

              location = /50x.html {
                  root /usr/share/nginx/html;
              }

              access_log /var/log/nginx/{{ app_name }}_access.log;
              error_log /var/log/nginx/{{ app_name }}_error.log;
          }

    - name: Create application root directory
      file:
        path: /var/www
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: Check Nginx status
      systemd:
        name: nginx
      register: nginx_status

    - name: Display Nginx status
      debug:
        msg: "Nginx Status: {{ nginx_status.status.ActiveState }}"

    - name: Check what's using port 80
      shell: ss -tlnp | grep :80 || echo "Nothing on port 80"
      register: port_check
      changed_when: false

    - name: Display port 80 usage
      debug:
        var: port_check.stdout_lines

    - name: Kill any process using port 80 (if exists)
      shell: |
        PID=$(ss -tlnp | grep ':80' | grep -v 'nginx' | awk '{print $6}' | sed 's/pid=//' | cut -d',' -f1)
        if [ ! -z "$PID" ]; then
          kill -9 $PID || true
        fi
      ignore_errors: yes

    - name: Restart Nginx after killing conflicting processes
      systemd:
        name: nginx
        state: restarted
      ignore_errors: yes

    - name: Verify Nginx listening on port 80
      wait_for:
        port: 80
        timeout: 30

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Verify Docker Compose installation
      command: docker compose version
      register: compose_version
      changed_when: false

    - name: Verify Nginx installation
      command: nginx -v
      register: nginx_version
      changed_when: false
      failed_when: false

    - name: Setup complete summary
      debug:
        msg: |
          ============================================
          VM SETUP COMPLETE
          ============================================
          Docker: {{ docker_version.stdout }}
          Docker Compose: {{ compose_version.stdout }}
          Nginx: Running on port 80 (proxying to port {{ app_port }})
          Python Venv: /opt/venv
          Application Directory: /var/www
          ============================================

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
