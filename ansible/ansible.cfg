[defaults]
inventory = aws_ec2.yaml
host_key_checking = False
remote_user = ec2-user
timeout = 30
gathering = smart
deprecation_warnings = False
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache
fact_caching_timeout = 3600
callback_whitelist = profile_tasks

[ssh_connection]
# ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ProxyJump=ec2-user@3.110.33.235
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ProxyJump=ec2-user@13.233.56.172 -o StrictHostKeyChecking=no

pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
timeout = 120