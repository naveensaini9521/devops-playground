---
plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  instance-state-name: running
  tag:Name:
    - smart-voting-server

hostnames:
  - public_ip_address

keyed_groups:
  - key: ec2_tags.Name
    prefix: tag

compose:
  ansible_host: private_ip_address
  ansible_user: ec2-user
  ansible_ssh_private_key_file: /home/naveen-saini/Desktop/AWS/devops-key.pem
  ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i /home/naveen-saini/Desktop/AWS/devops-key.pem ec2-user@<BASTION_PUBLIC_IP>"'
  ansible_python_interpreter: /usr/bin/python3
