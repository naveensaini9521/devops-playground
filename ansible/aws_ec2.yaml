---
plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  instance-state-name: running
  tag:Project: crawler

hostnames:
  - private-ip-address
    options:
      - tag:Name

keyed_groups:
  - key: ec2_tags.Name
    prefix: name
    separator: _
  - key: ec2_tags.Tier
    prefix: tier
  - key: ec2_tags.Role
    prefix: role
  - key: ec2_tags.Environment
    prefix: env

compose:
  ansible_host: private_ip_address
  ansible_user: ec2-user
  ansible_ssh_private_key_file: /home/naveen-saini/Desktop/AWS/devops-key.pem
  ansible_python_interpreter: /usr/bin/python3
